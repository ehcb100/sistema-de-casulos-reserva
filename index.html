<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RNA | Reserva No App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- QR CODE -->

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

/* =========================================================
RESET
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020617;
color:white;
font-family:'Rajdhani', sans-serif;
overflow-x:hidden;
}

/* =========================================================
FUNDO
========================================================= */

body::before{

content:'';

position:fixed;

inset:0;

background:

linear-gradient(rgba(0,180,255,0.05) 1px, transparent 1px),

linear-gradient(90deg, rgba(0,180,255,0.05) 1px, transparent 1px);

background-size:40px 40px;

pointer-events:none;

}

/* =========================================================
TOPO
========================================================= */

.topbar{

width:100%;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid rgba(0,180,255,0.2);

background:rgba(0,0,0,0.35);

backdrop-filter:blur(10px);

}

.logo{

font-size:34px;

font-weight:700;

color:#38bdf8;

}

.logo span{

color:white;

}

.status{

color:#22c55e;

font-size:18px;

}

/* =========================================================
STATS
========================================================= */

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

padding:20px;

}

.stat-card{

background:rgba(0,0,0,0.3);

border:1px solid rgba(0,180,255,0.2);

padding:20px;

}

.stat-card h2{

color:#38bdf8;

font-size:18px;

}

.stat-card p{

font-size:38px;

margin-top:10px;

}

/* =========================================================
ABAS
========================================================= */

.tabs{

display:flex;

gap:10px;

padding:0 20px 20px;

flex-wrap:wrap;

}

.tab-btn{

padding:14px 22px;

border:1px solid rgba(0,180,255,0.2);

background:rgba(255,255,255,0.04);

color:white;

cursor:pointer;

transition:0.3s;

font-size:18px;

font-family:'Rajdhani', sans-serif;

}

.active-tab{

background:#0284c7;

border-color:#38bdf8;

}

/* =========================================================
CONTAINER
========================================================= */

.container{

padding:20px;

}

.tab-content{

display:none;

}

.active-content{

display:block;

}

/* =========================================================
CARD
========================================================= */

.card{

background:rgba(0,0,0,0.3);

border:1px solid rgba(0,180,255,0.2);

padding:20px;

margin-bottom:20px;

}

.card-title{

color:#38bdf8;

font-size:28px;

margin-bottom:20px;

}

/* =========================================================
GRID
========================================================= */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

/* =========================================================
INPUTS
========================================================= */

input,
textarea{

width:100%;

padding:14px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(0,180,255,0.2);

color:white;

margin-bottom:15px;

outline:none;

font-size:18px;

font-family:'Rajdhani', sans-serif;

}

textarea{

resize:none;

height:120px;

}

/* =========================================================
BOTÕES
========================================================= */

button{

width:100%;

padding:14px;

border:none;

background:#0284c7;

color:white;

font-size:18px;

cursor:pointer;

margin-top:10px;

font-family:'Rajdhani', sans-serif;

}

button:hover{

opacity:0.9;

}

/* =========================================================
BOTÃO REMOVER
========================================================= */

.btn-remover{

background:#991b1b !important;

}

.btn-remover:hover{

background:#dc2626 !important;

}

/* =========================================================
CASULOS
========================================================= */

.casulo{

border:1px solid rgba(0,180,255,0.15);

padding:20px;

margin-bottom:20px;

}

.casulo h2{

color:#7dd3fc;

font-size:30px;

}

.info{

margin-top:10px;

font-size:18px;

color:#cbd5e1;

}

/* =========================================================
STATUS
========================================================= */

.status-tag{

display:inline-block;

padding:6px 14px;

margin-top:15px;

font-size:16px;

font-weight:700;

}

.normal{
background:#166534;
}

.baixo{
background:#a16207;
}

.vazio{
background:#991b1b;
}

/* =========================================================
QR CODE
========================================================= */

.qrcode{

margin-top:15px;

background:white;

display:inline-block;

padding:10px;

}

/* =========================================================
MAPA
========================================================= */

.mapa-rna{

position:relative;

width:100%;

height:900px;

background:#d9d9d9;

border-radius:12px;

overflow:hidden;

border:1px solid rgba(0,180,255,0.2);

}

.corredor{

position:absolute;

background:#6b7280;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

font-weight:700;

border:4px solid #111827;

}

.corredor span{

writing-mode:vertical-rl;

transform:rotate(180deg);

font-size:24px;

}

.tenis{
left:40px;
top:40px;
width:140px;
height:760px;
}

.mini{
left:260px;
top:40px;
width:140px;
height:760px;
}

.bermudas{
left:480px;
top:40px;
width:140px;
height:760px;
}

.casacos{
left:700px;
top:40px;
width:140px;
height:760px;
}

.camisetas{
right:40px;
top:40px;
width:140px;
height:760px;
}

.caixa{

position:absolute;

bottom:30px;

left:50%;

transform:translateX(-50%);

width:240px;

height:80px;

background:#4b5563;

color:white;

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

font-weight:700;

border:4px solid #111827;

}

.entrada{

position:absolute;

bottom:130px;

right:60px;

color:#111827;

font-size:24px;

font-weight:700;

}

/* =========================================================
RESPONSIVO
========================================================= */

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr 1fr;
}

.topbar{
flex-direction:column;
gap:10px;
text-align:center;
}

.mapa-rna{
overflow:auto;
min-width:1000px;
}

}

</style>

</head>

<body>

<!-- =========================================================
TOPO
========================================================= -->

<div class="topbar">

<div class="logo">
RNA <span>| Reserva No App</span>
</div>

<div class="status">
● SISTEMA ONLINE
</div>

</div>

<!-- =========================================================
STATS
========================================================= -->

<div class="stats">

<div class="stat-card">
<h2>Total Casulos</h2>
<p id="totalCasulos">0</p>
</div>

<div class="stat-card">
<h2>Total Peças</h2>
<p id="totalPecas">0</p>
</div>

<div class="stat-card">
<h2>Casulos Vazios</h2>
<p id="casulosVazios">0</p>
</div>

<div class="stat-card">
<h2>Reposição</h2>
<p id="reposicao">0</p>
</div>

</div>

<!-- =========================================================
ABAS
========================================================= -->

<div class="tabs">

<button class="tab-btn active-tab"
onclick="abrirAba('dashboard', this)">
Dashboard
</button>

<button class="tab-btn"
onclick="abrirAba('cadastro', this)">
Cadastro
</button>

<button class="tab-btn"
onclick="abrirAba('pesquisa', this)">
Pesquisa
</button>

<button class="tab-btn"
onclick="abrirAba('mapa', this)">
Mapa
</button>

</div>

<!-- =========================================================
CONTAINER
========================================================= -->

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard"
class="tab-content active-content">

<div class="card">

<div class="card-title">
CASULOS REGISTRADOS
</div>

<div id="listaCasulos"></div>

</div>

</div>

<!-- CADASTRO -->

<div id="cadastro"
class="tab-content">

<div class="card">

<div class="card-title">
REGISTRAR CASULO
</div>

<div class="grid">

<div>

<input type="text"
id="codigo"
placeholder="Código">

<input type="text"
id="sessao"
placeholder="Sessão">

<input type="text"
id="peca"
placeholder="Peça">

</div>

<div>

<input type="text"
id="corredor"
placeholder="Corredor">

<input type="text"
id="prateleira"
placeholder="Prateleira">

<input type="number"
id="quantidade"
placeholder="Quantidade">

</div>

</div>

<textarea id="obs"
placeholder="Observações"></textarea>

<button onclick="cadastrarCasulo()">
SALVAR CASULO
</button>

</div>

</div>

<!-- PESQUISA -->

<div id="pesquisa"
class="tab-content">

<div class="card">

<div class="card-title">
BUSCAR CASULO
</div>

<input type="text"
id="buscarCodigo"
placeholder="Buscar código ou peça">

<button onclick="pesquisarCasulo()">
BUSCAR
</button>

<br><br>

<div id="resultadoPesquisa"></div>

</div>

</div>

<!-- MAPA -->

<div id="mapa"
class="tab-content">

<div class="card">

<div class="card-title">
MAPA VISUAL DO ESTOQUE
</div>

<div class="mapa-rna">

<div class="corredor tenis">
<span>TÊNIS</span>
</div>

<div class="corredor mini">
<span>ROUPAS MINI</span>
</div>

<div class="corredor bermudas">
<span>BERMUDAS<br>E CALÇAS</span>
</div>

<div class="corredor casacos">
<span>CASACOS<br>CAMISAS ML/MC</span>
</div>

<div class="corredor camisetas">
<span>CAMISETAS<br>E CALÇADOS</span>
</div>

<div class="caixa">
CAIXA
</div>

<div class="entrada">
ENTRADA
</div>

</div>

</div>

</div>

</div>

<script>

/* =========================================================
FIREBASE
========================================================= */

const firebaseConfig = {

apiKey: "AIzaSyCn2IrcktQPSGoAmqTyraqNznKGbXzx06s",

authDomain: "rna-system.firebaseapp.com",

projectId: "rna-system",

storageBucket: "rna-system.firebasestorage.app",

messagingSenderId: "1021119315318",

appId: "1:1021119315318:web:304e9d95fab166b365ce57",

measurementId: "G-P6FL4K83QH"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* =========================================================
ABAS
========================================================= */

function abrirAba(id, botao){

document.querySelectorAll('.tab-content')
.forEach(tab=>{
tab.classList.remove('active-content');
});

document.querySelectorAll('.tab-btn')
.forEach(btn=>{
btn.classList.remove('active-tab');
});

document.getElementById(id)
.classList.add('active-content');

botao.classList.add('active-tab');

}

/* =========================================================
CADASTRAR
========================================================= */

async function cadastrarCasulo(){

const codigo =
document.getElementById('codigo').value;

const sessao =
document.getElementById('sessao').value;

const peca =
document.getElementById('peca').value;

const corredor =
document.getElementById('corredor').value;

const prateleira =
document.getElementById('prateleira').value;

const quantidade =
document.getElementById('quantidade').value;

const obs =
document.getElementById('obs').value;

if(!codigo || !peca || !quantidade){

alert("Preencha os campos.");
return;

}

try{

await db.collection("casulos")
.add({

codigo,
sessao,
peca,
corredor,
prateleira,
quantidade:parseInt(quantidade) || 0,
obs,
criadoEm:new Date()

});

limparCampos();

alert("Casulo registrado!");

}catch(error){

console.error(error);

alert("Erro ao cadastrar.");

}

}

/* =========================================================
LIMPAR
========================================================= */

function limparCampos(){

document.getElementById('codigo').value = '';
document.getElementById('sessao').value = '';
document.getElementById('peca').value = '';
document.getElementById('corredor').value = '';
document.getElementById('prateleira').value = '';
document.getElementById('quantidade').value = '';
document.getElementById('obs').value = '';

}

/* =========================================================
STATUS
========================================================= */

function pegarStatus(qtd){

if(qtd <= 0){
return "vazio";
}else if(qtd <= 3){
return "baixo";
}else{
return "normal";
}

}

/* =========================================================
CARREGAR CASULOS
========================================================= */

function carregarCasulos(){

db.collection("casulos")
.onSnapshot((snapshot)=>{

const lista =
document.getElementById("listaCasulos");

lista.innerHTML = "";

let totalCasulos = 0;
let totalPecas = 0;
let vazios = 0;
let reposicao = 0;

snapshot.forEach((doc)=>{

const data = doc.data();

const docId = doc.id;

totalCasulos++;

totalPecas += data.quantidade;

if(data.quantidade <= 0){
vazios++;
}

if(data.quantidade <= 3){
reposicao++;
}

const status =
pegarStatus(data.quantidade);

const div =
document.createElement("div");

div.classList.add("casulo");

div.innerHTML = `

<h2>${data.codigo}</h2>

<div class="info">
Peça: ${data.peca}
</div>

<div class="info">
Sessão: ${data.sessao}
</div>

<div class="info">
Corredor: ${data.corredor}
</div>

<div class="info">
Prateleira: ${data.prateleira}
</div>

<div class="info">
Quantidade: ${data.quantidade}
</div>

<div class="status-tag ${status}">
${status.toUpperCase()}
</div>

<div class="qrcode">
<canvas id="qr-${docId}"></canvas>
</div>

<button onclick="retirarPeca('${docId}', ${data.quantidade})">
RETIRAR PEÇA
</button>

<button onclick="adicionarPeca('${docId}', ${data.quantidade})">
ADICIONAR PEÇA
</button>

<button
class="btn-remover"
onclick="removerCasulo('${docId}')">
APAGAR CASULO
</button>

`;

lista.appendChild(div);

QRCode.toCanvas(
document.getElementById(`qr-${docId}`),
data.codigo,
{
width:120
}
);

});

document.getElementById("totalCasulos")
.innerText = totalCasulos;

document.getElementById("totalPecas")
.innerText = totalPecas;

document.getElementById("casulosVazios")
.innerText = vazios;

document.getElementById("reposicao")
.innerText = reposicao;

});

}

/* =========================================================
RETIRAR
========================================================= */

async function retirarPeca(id, quantidade){

try{

const novoValor = quantidade - 1;

if(novoValor <= 0){

const confirmar = confirm(
`O casulo ficará vazio.\nDeseja remover?`
);

if(confirmar){

await db.collection("casulos")
.doc(id)
.delete();

return;

}

await db.collection("casulos")
.doc(id)
.update({
quantidade:0
});

return;

}

await db.collection("casulos")
.doc(id)
.update({
quantidade:novoValor
});

}catch(error){

console.error(error);

alert("Erro ao retirar.");

}

}

/* =========================================================
ADICIONAR
========================================================= */

async function adicionarPeca(id, quantidade){

try{

await db.collection("casulos")
.doc(id)
.update({
quantidade:quantidade + 1
});

}catch(error){

console.error(error);

alert("Erro ao adicionar.");

}

}

/* =========================================================
REMOVER CASULO
========================================================= */

async function removerCasulo(id){

const confirmar = confirm(
"Deseja apagar este casulo?"
);

if(!confirmar) return;

try{

await db.collection("casulos")
.doc(id)
.delete();

alert("Casulo removido!");

}catch(error){

console.error(error);

alert("Erro ao remover.");

}

}

/* =========================================================
PESQUISAR
========================================================= */

async function pesquisarCasulo(){

const termo =
document.getElementById("buscarCodigo")
.value
.toLowerCase();

const resultado =
document.getElementById("resultadoPesquisa");

resultado.innerHTML = "";

const snapshot =
await db.collection("casulos")
.get();

snapshot.forEach((doc)=>{

const data = doc.data();

if(
data.codigo.toLowerCase().includes(termo)
||
data.peca.toLowerCase().includes(termo)
){

resultado.innerHTML += `

<div class="casulo">

<h2>${data.codigo}</h2>

<div class="info">
${data.peca}
</div>

<div class="info">
Corredor ${data.corredor}
</div>

<div class="info">
Prateleira ${data.prateleira}
</div>

<div class="info">
Quantidade ${data.quantidade}
</div>

</div>

`;

}

});

}

/* =========================================================
INICIAR
========================================================= */

carregarCasulos();

</script>

</body>

</html>
