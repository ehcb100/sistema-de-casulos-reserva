<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RNA | Reserva No App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- QR -->

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#020617;
color:white;
font-family:'Rajdhani', sans-serif;
overflow-x:hidden;

}

body::before{

content:'';

position:fixed;
inset:0;

background:
linear-gradient(rgba(0,180,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,180,255,0.05) 1px, transparent 1px);

background-size:40px 40px;

pointer-events:none;

}

.topbar{

width:100%;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(0,0,0,0.35);

border-bottom:1px solid rgba(0,180,255,0.2);

backdrop-filter:blur(10px);

}

.logo{

font-size:34px;
font-weight:700;
color:#38bdf8;

}

.logo span{
color:white;
}

.status{

color:#22c55e;
font-size:18px;

}

.tabs{

display:flex;
gap:10px;

padding:20px;

flex-wrap:wrap;

}

.tab-btn{

padding:14px 22px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(0,180,255,0.2);

color:white;

cursor:pointer;

font-size:18px;

font-family:'Rajdhani', sans-serif;

}

.active-tab{

background:#0284c7;

border-color:#38bdf8;

}

.container{
padding:20px;
}

.tab-content{
display:none;
}

.active-content{
display:block;
}

.card{

background:rgba(0,0,0,0.3);

border:1px solid rgba(0,180,255,0.2);

padding:20px;

margin-bottom:20px;

}

.card-title{

font-size:28px;
color:#38bdf8;

margin-bottom:20px;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;

gap:20px;

}

input,
textarea{

width:100%;

padding:14px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(0,180,255,0.2);

color:white;

font-size:18px;

font-family:'Rajdhani', sans-serif;

margin-bottom:15px;

outline:none;

}

textarea{

resize:none;
height:120px;

}

button{

width:100%;

padding:14px;

border:none;

background:#0284c7;

color:white;

font-size:18px;

font-family:'Rajdhani', sans-serif;

cursor:pointer;

margin-top:10px;

}

.btn-remover{
background:#991b1b;
}

.btn-editar{
background:#7c3aed;
}

.casulo{

border:1px solid rgba(0,180,255,0.15);

padding:20px;

margin-bottom:20px;

}

.casulo h2{

font-size:30px;
color:#7dd3fc;

}

.info{

margin-top:10px;
font-size:18px;
color:#cbd5e1;

}

.qrcode{

margin-top:15px;

display:inline-block;

background:white;

padding:10px;

}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
gap:10px;
text-align:center;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
RNA <span>| Reserva No App</span>
</div>

<div class="status">
● SISTEMA ONLINE
</div>

</div>

<div class="tabs">

<button class="tab-btn active-tab"
onclick="abrirAba('dashboard', this)">
Dashboard
</button>

<button class="tab-btn"
onclick="abrirAba('cadastro', this)">
Cadastro
</button>

<button class="tab-btn"
onclick="abrirAba('pesquisa', this)">
Pesquisa
</button>

</div>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard"
class="tab-content active-content">

<div class="card">

<div class="card-title">
CASULOS REGISTRADOS
</div>

<button onclick="gerarPDFSelecionados()">
GERAR PDF DOS SELECIONADOS
</button>

<br><br>

<div id="listaCasulos"></div>

</div>

</div>

<!-- CADASTRO -->

<div id="cadastro"
class="tab-content">

<div class="card">

<div class="card-title">
REGISTRAR CASULO
</div>

<div class="grid">

<div>

<input type="text"
id="codigo"
placeholder="Código">

<input type="text"
id="sessao"
placeholder="Sessão">

<input type="text"
id="peca"
placeholder="Peça">

</div>

<div>

<input type="text"
id="corredor"
placeholder="Corredor">

<input type="text"
id="prateleira"
placeholder="Prateleira">

<input type="number"
id="quantidade"
placeholder="Quantidade">

</div>

</div>

<textarea id="obs"
placeholder="Observações"></textarea>

<button onclick="cadastrarCasulo()">
SALVAR CASULO
</button>

</div>

</div>

<!-- PESQUISA -->

<div id="pesquisa"
class="tab-content">

<div class="card">

<div class="card-title">
BUSCAR CASULO
</div>

<input type="text"
id="buscarCodigo"
placeholder="Buscar código ou peça">

<button onclick="pesquisarCasulo()">
BUSCAR
</button>

<br><br>

<div id="resultadoPesquisa"></div>

</div>

</div>

</div>

<script>

/* =========================================================
FIREBASE
========================================================= */

const firebaseConfig = {

apiKey: "AIzaSyCn2IrcktQPSGoAmqTyraqNznKGbXzx06s",
authDomain: "rna-system.firebaseapp.com",
projectId: "rna-system",
storageBucket: "rna-system.firebasestorage.app",
messagingSenderId: "1021119315318",
appId: "1:1021119315318:web:304e9d95fab166b365ce57",
measurementId: "G-P6FL4K83QH"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* =========================================================
ABAS
========================================================= */

function abrirAba(id, botao){

document.querySelectorAll('.tab-content')
.forEach(tab=>{
tab.classList.remove('active-content');
});

document.querySelectorAll('.tab-btn')
.forEach(btn=>{
btn.classList.remove('active-tab');
});

document.getElementById(id)
.classList.add('active-content');

botao.classList.add('active-tab');

}

/* =========================================================
CADASTRAR
========================================================= */

async function cadastrarCasulo(){

const codigo =
document.getElementById('codigo').value;

const sessao =
document.getElementById('sessao').value;

const peca =
document.getElementById('peca').value;

const corredor =
document.getElementById('corredor').value;

const prateleira =
document.getElementById('prateleira').value;

const quantidade =
document.getElementById('quantidade').value;

const obs =
document.getElementById('obs').value;

if(!codigo || !peca || !quantidade){

alert("Preencha os campos.");
return;

}

await db.collection("casulos").add({

codigo,
sessao,
peca,
corredor,
prateleira,
quantidade:parseInt(quantidade),
obs,
criadoEm:new Date()

});

alert("Casulo registrado!");

}

/* =========================================================
CARREGAR
========================================================= */

function carregarCasulos(){

db.collection("casulos")
.onSnapshot((snapshot)=>{

const lista =
document.getElementById("listaCasulos");

lista.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();

const docId = doc.id;

const div =
document.createElement("div");

div.classList.add("casulo");

div.innerHTML = `

<label style="display:flex;gap:10px;align-items:center;margin-bottom:15px;">

<input
type="checkbox"
class="pdf-select"
value="${docId}">

Selecionar PDF

</label>

<h2>${data.codigo}</h2>

<div class="info"><b>Peça:</b> ${data.peca}</div>

<div class="info"><b>Sessão:</b> ${data.sessao}</div>

<div class="info"><b>Quantidade:</b> ${data.quantidade}</div>

<div class="info"><b>Obs:</b> ${data.obs}</div>

<div class="qrcode">
<canvas id="qr-${docId}"></canvas>
</div>

<button onclick="editarCasulo('${docId}')">
EDITAR
</button>

<button
class="btn-remover"
onclick="removerCasulo('${docId}')">
APAGAR
</button>

`;

lista.appendChild(div);

QRCode.toCanvas(
document.getElementById(`qr-${docId}`),
data.codigo,
{
width:120
}
);

});

});

}

/* =========================================================
EDITAR
========================================================= */

async function editarCasulo(id){

const doc =
await db.collection("casulos")
.doc(id)
.get();

const data = doc.data();

const novoCodigo =
prompt("Código:", data.codigo);

const novaQtd =
prompt("Quantidade:", data.quantidade);

await db.collection("casulos")
.doc(id)
.update({

codigo:novoCodigo,
quantidade:parseInt(novaQtd)

});

}

/* =========================================================
REMOVER
========================================================= */

async function removerCasulo(id){

const confirmar =
confirm("Apagar casulo?");

if(!confirmar) return;

await db.collection("casulos")
.doc(id)
.delete();

}

/* =========================================================
PESQUISA
========================================================= */

async function pesquisarCasulo(){

const termo =
document.getElementById("buscarCodigo")
.value
.toLowerCase();

const resultado =
document.getElementById("resultadoPesquisa");

resultado.innerHTML = "";

const snapshot =
await db.collection("casulos").get();

snapshot.forEach((doc)=>{

const data = doc.data();

if(
data.codigo.toLowerCase().includes(termo)
||
data.peca.toLowerCase().includes(termo)
){

resultado.innerHTML += `

<div class="casulo">

<h2>${data.codigo}</h2>

<div class="info">${data.peca}</div>

<div class="info">
Quantidade ${data.quantidade}
</div>

</div>

`;

}

});

}

/* =========================================================
PDF PROFISSIONAL FINAL
========================================================= */

async function gerarPDFSelecionados(){

const checkboxes =
document.querySelectorAll('.pdf-select:checked');

if(checkboxes.length <= 0){

alert("Selecione ao menos um casulo.");
return;

}

const pdf =
new window.jspdf.jsPDF(
'p',
'mm',
'a4'
);

/* =========================================================
TÍTULO
========================================================= */

pdf.setFont("helvetica","bold");
pdf.setFontSize(18);

pdf.text("Reserva No App", 14, 20);

pdf.setFontSize(10);

pdf.text(
"Relatório profissional de estoque",
14,
28
);

let y = 40;

/* =========================================================
COLUNAS FINAIS
========================================================= */

const colunas = [

"PEÇA",
"REF.",
"QTD",
"OBSERVAÇÕES"

];

const largura = [

68,
38,
20,
64

];

let x = 14;

pdf.setFont("helvetica","bold");
pdf.setFontSize(9);

for(let i=0;i<colunas.length;i++){

pdf.rect(x,y,largura[i],10);

pdf.text(
colunas[i],
x+2,
y+6
);

x += largura[i];

}

y += 10;

/* =========================================================
LINHAS INTELIGENTES
========================================================= */

for(const item of checkboxes){

const id = item.value;

const doc =
await db.collection("casulos")
.doc(id)
.get();

if(!doc.exists) continue;

const data = doc.data();

const linha = [

data.peca || '-',

data.codigo || '-',

String(data.quantidade || 0),

data.obs || '-'

];

x = 14;

let textosFormatados = [];
let maiorAltura = 0;

for(let i=0;i<linha.length;i++){

const textoQuebrado =
pdf.splitTextToSize(
String(linha[i]),
largura[i]-4
);

textosFormatados.push(textoQuebrado);

const alturaTexto =
(textoQuebrado.length * 5) + 4;

if(alturaTexto > maiorAltura){

maiorAltura = alturaTexto;

}

}

for(let i=0;i<linha.length;i++){

pdf.rect(
x,
y,
largura[i],
maiorAltura
);

pdf.setFont("helvetica","normal");
pdf.setFontSize(7);

pdf.text(
textosFormatados[i],
x + 2,
y + 5
);

x += largura[i];

}

y += maiorAltura;

if(y >= 260){

pdf.addPage();

y = 20;

}

}

pdf.save("RNA_RELATORIO.pdf");

}

/* =========================================================
INICIAR
========================================================= */

carregarCasulos();

</script>

</body>

</html>
