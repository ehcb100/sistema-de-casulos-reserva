<!-- =========================================================
RNA SYSTEM V5
RESERVA NO APP
SISTEMA COMPLETO
========================================================= -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RNA | Reserva No App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- QR CODE -->

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

/* =========================================================
RESET
========================================================= */

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

body{

    background:#020617;

    color:white;

    font-family:'Rajdhani', sans-serif;

    overflow-x:hidden;

}

/* =========================================================
FUNDO
========================================================= */

body::before{

    content:'';

    position:fixed;

    inset:0;

    background:

    linear-gradient(rgba(0,180,255,0.05) 1px, transparent 1px),

    linear-gradient(90deg, rgba(0,180,255,0.05) 1px, transparent 1px);

    background-size:40px 40px;

    pointer-events:none;

}

/* =========================================================
TOPO
========================================================= */

.topbar{

    width:100%;

    padding:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-bottom:1px solid rgba(0,180,255,0.2);

    background:rgba(0,0,0,0.35);

    backdrop-filter:blur(10px);

}

.logo{

    font-size:34px;

    font-weight:700;

    color:#38bdf8;

}

.logo span{

    color:white;

}

.status{

    color:#22c55e;

    font-size:18px;

}

/* =========================================================
STATS
========================================================= */

.stats{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:20px;

    padding:20px;

}

.stat-card{

    background:rgba(0,0,0,0.3);

    border:1px solid rgba(0,180,255,0.2);

    padding:20px;

    backdrop-filter:blur(10px);

}

.stat-card h2{

    color:#38bdf8;

    font-size:18px;

}

.stat-card p{

    font-size:38px;

    margin-top:10px;

}

/* =========================================================
ABAS
========================================================= */

.tabs{

    display:flex;

    gap:10px;

    padding:0 20px 20px;

    flex-wrap:wrap;

}

.tab-btn{

    padding:14px 22px;

    border:1px solid rgba(0,180,255,0.2);

    background:rgba(255,255,255,0.04);

    color:white;

    cursor:pointer;

    transition:0.3s;

    font-size:18px;

    font-family:'Rajdhani', sans-serif;

}

.tab-btn:hover{

    background:rgba(0,180,255,0.1);

    border-color:#38bdf8;

}

.active-tab{

    background:#0284c7;

    border-color:#38bdf8;

}

/* =========================================================
CONTAINER
========================================================= */

.container{

    padding:20px;

}

.tab-content{

    display:none;

}

.active-content{

    display:block;

}

/* =========================================================
CARD
========================================================= */

.card{

    background:rgba(0,0,0,0.3);

    border:1px solid rgba(0,180,255,0.2);

    padding:20px;

    margin-bottom:20px;

    backdrop-filter:blur(10px);

}

.card-title{

    color:#38bdf8;

    font-size:28px;

    margin-bottom:20px;

}

/* =========================================================
GRID
========================================================= */

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

}

/* =========================================================
INPUTS
========================================================= */

input,
textarea{

    width:100%;

    padding:14px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(0,180,255,0.2);

    color:white;

    margin-bottom:15px;

    outline:none;

    font-size:18px;

    font-family:'Rajdhani', sans-serif;

}

input:focus,
textarea:focus{

    border-color:#38bdf8;

    box-shadow:0 0 15px rgba(0,180,255,0.3);

}

textarea{

    resize:none;

    height:120px;

}

/* =========================================================
BOTÕES
========================================================= */

button{

    width:100%;

    padding:14px;

    border:none;

    background:#0284c7;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

    font-family:'Rajdhani', sans-serif;

}

button:hover{

    background:#0ea5e9;

}

/* =========================================================
CASULOS
========================================================= */

.casulo{

    border:1px solid rgba(0,180,255,0.15);

    padding:20px;

    margin-bottom:20px;

    transition:0.3s;

}

.casulo:hover{

    border-color:#38bdf8;

    background:rgba(0,180,255,0.05);

}

.casulo h2{

    color:#7dd3fc;

    font-size:30px;

}

.info{

    margin-top:10px;

    font-size:18px;

    color:#cbd5e1;

}

/* =========================================================
STATUS
========================================================= */

.status-tag{

    display:inline-block;

    padding:6px 14px;

    margin-top:15px;

    font-size:16px;

    font-weight:700;

}

.normal{

    background:#166534;

}

.baixo{

    background:#a16207;

}

.vazio{

    background:#991b1b;

}

/* =========================================================
QR
========================================================= */

.qrcode{

    margin-top:15px;

    background:white;

    display:inline-block;

    padding:10px;

}

/* =========================================================
MAPA VISUAL
========================================================= */

.mapa-visual-container{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

.mapa-visual{

    width:100%;

    max-width:1400px;

    border:1px solid rgba(0,180,255,0.2);

    border-radius:10px;

    box-shadow:0 0 40px rgba(0,180,255,0.15);

}

/* =========================================================
HISTÓRICO
========================================================= */

.historico-item{

    padding:15px;

    border-bottom:1px solid rgba(255,255,255,0.08);

    font-size:18px;

}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:900px){

    .grid{

        grid-template-columns:1fr;

    }

    .stats{

        grid-template-columns:1fr 1fr;

    }

    .topbar{

        flex-direction:column;

        gap:10px;

        text-align:center;

    }

    .logo{

        font-size:28px;

    }

}

</style>

</head>

<body>

<!-- =========================================================
TOPO
========================================================= -->

<div class="topbar">

    <div class="logo">

        RNA <span>| Reserva No App</span>

    </div>

    <div class="status">

        ● SISTEMA ONLINE

    </div>

</div>

<!-- =========================================================
STATS
========================================================= -->

<div class="stats">

    <div class="stat-card">

        <h2>Total Casulos</h2>

        <p id="totalCasulos">0</p>

    </div>

    <div class="stat-card">

        <h2>Total Peças</h2>

        <p id="totalPecas">0</p>

    </div>

    <div class="stat-card">

        <h2>Casulos Vazios</h2>

        <p id="casulosVazios">0</p>

    </div>

    <div class="stat-card">

        <h2>Reposição</h2>

        <p id="reposicao">0</p>

    </div>

</div>

<!-- =========================================================
ABAS
========================================================= -->

<div class="tabs">

    <button class="tab-btn active-tab"
    onclick="abrirAba('dashboard', this)">
        Dashboard
    </button>

    <button class="tab-btn"
    onclick="abrirAba('cadastro', this)">
        Cadastro
    </button>

    <button class="tab-btn"
    onclick="abrirAba('pesquisa', this)">
        Pesquisa
    </button>

    <button class="tab-btn"
    onclick="abrirAba('mapa', this)">
        Mapa
    </button>

    <button class="tab-btn"
    onclick="abrirAba('historico', this)">
        Histórico
    </button>

</div>

<!-- =========================================================
CONTAINER
========================================================= -->

<div class="container">

<!-- =========================================================
DASHBOARD
========================================================= -->

<div id="dashboard"
class="tab-content active-content">

<div class="card">

<div class="card-title">

CASULOS REGISTRADOS

</div>

<div id="listaCasulos"></div>

</div>

</div>

<!-- =========================================================
CADASTRO
========================================================= -->

<div id="cadastro"
class="tab-content">

<div class="card">

<div class="card-title">

REGISTRAR CASULO

</div>

<div class="grid">

<div>

<input type="text"
id="codigo"
placeholder="Código">

<input type="text"
id="sessao"
placeholder="Sessão">

<input type="text"
id="peca"
placeholder="Peça">

<input type="text"
id="corredor"
placeholder="Corredor">

</div>

<div>

<input type="text"
id="prateleira"
placeholder="Prateleira">

<input type="number"
id="quantidade"
placeholder="Quantidade">

<textarea id="obs"
placeholder="Observações"></textarea>

</div>

</div>

<button onclick="cadastrarCasulo()">

SALVAR CASULO

</button>

</div>

</div>

<!-- =========================================================
PESQUISA
========================================================= -->

<div id="pesquisa"
class="tab-content">

<div class="card">

<div class="card-title">

BUSCA INTELIGENTE

</div>

<input type="text"
id="buscarCodigo"
placeholder="Buscar código ou peça">

<button onclick="pesquisarCasulo()">

BUSCAR

</button>

<br><br>

<div id="resultadoPesquisa"></div>

</div>

</div>

<!-- =========================================================
MAPA
========================================================= -->

<div id="mapa"
class="tab-content">

<div class="card">

<div class="card-title">

MAPA VISUAL DO ESTOQUE

</div>

<div class="mapa-visual-container">

<img
src="mapa-estoque-rna.png"
alt="Mapa do Estoque RNA"
class="mapa-visual">

</div>

</div>

</div>

<!-- =========================================================
HISTÓRICO
========================================================= -->

<div id="historico"
class="tab-content">

<div class="card">

<div class="card-title">

MOVIMENTAÇÕES

</div>

<div id="historicoLista"></div>

</div>

</div>

</div>

<script>

/* =========================================================
FIREBASE
========================================================= */

const firebaseConfig = {

apiKey: "AIzaSyCn2IrcktQPSGoAmqTyraqNznKGbXzx06s",

authDomain: "rna-system.firebaseapp.com",

projectId: "rna-system",

storageBucket: "rna-system.firebasestorage.app",

messagingSenderId: "1021119315318",

appId: "1:1021119315318:web:304e9d95fab166b365ce57",

measurementId: "G-P6FL4K83QH"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* =========================================================
ABAS
========================================================= */

function abrirAba(id, botao){

document.querySelectorAll('.tab-content')
.forEach(tab=>{

tab.classList.remove('active-content');

});

document.querySelectorAll('.tab-btn')
.forEach(btn=>{

btn.classList.remove('active-tab');

});

document.getElementById(id)
.classList.add('active-content');

botao.classList.add('active-tab');

}

/* =========================================================
CADASTRAR
========================================================= */

async function cadastrarCasulo(){

const codigo =
document.getElementById('codigo').value;

const sessao =
document.getElementById('sessao').value;

const peca =
document.getElementById('peca').value;

const corredor =
document.getElementById('corredor').value;

const prateleira =
document.getElementById('prateleira').value;

const quantidade =
document.getElementById('quantidade').value;

const obs =
document.getElementById('obs').value;

if(!codigo || !peca || !quantidade){

alert("Preencha os campos.");

return;

}

await db.collection("casulos")
.doc(codigo)
.set({

codigo,
sessao,
peca,
corredor,
prateleira,
quantidade:Number(quantidade),
obs,
criadoEm:new Date()

});

await registrarHistorico(
`➕ Casulo ${codigo} registrado`
);

limparCampos();

}

/* =========================================================
LIMPAR
========================================================= */

function limparCampos(){

document.getElementById('codigo').value = '';

document.getElementById('sessao').value = '';

document.getElementById('peca').value = '';

document.getElementById('corredor').value = '';

document.getElementById('prateleira').value = '';

document.getElementById('quantidade').value = '';

document.getElementById('obs').value = '';

}

/* =========================================================
STATUS
========================================================= */

function pegarStatus(qtd){

if(qtd <= 0){

return "vazio";

}else if(qtd <= 3){

return "baixo";

}else{

return "normal";

}

}

/* =========================================================
LISTAR
========================================================= */

function carregarCasulos(){

db.collection("casulos")
.orderBy("codigo")
.onSnapshot((snapshot)=>{

const lista =
document.getElementById("listaCasulos");

lista.innerHTML = "";

let totalCasulos = 0;
let totalPecas = 0;
let vazios = 0;
let reposicao = 0;

snapshot.forEach((doc)=>{

const data = doc.data();

totalCasulos++;

totalPecas += data.quantidade;

if(data.quantidade <= 0){

vazios++;

}

if(data.quantidade <= 3){

reposicao++;

}

const status =
pegarStatus(data.quantidade);

const div =
document.createElement("div");

div.classList.add("casulo");

div.innerHTML = `

<h2>${data.codigo}</h2>

<div class="info">
Peça: ${data.peca}
</div>

<div class="info">
Sessão: ${data.sessao}
</div>

<div class="info">
Corredor: ${data.corredor}
</div>

<div class="info">
Prateleira: ${data.prateleira}
</div>

<div class="info">
Quantidade: ${data.quantidade}
</div>

<div class="status-tag ${status}">
${status.toUpperCase()}
</div>

<div class="qrcode">

<canvas id="qr-${data.codigo}"></canvas>

</div>

<br><br>

<button onclick="retirarPeca('${data.codigo}', ${data.quantidade})">

RETIRAR PEÇA

</button>

<br><br>

<button onclick="adicionarPeca('${data.codigo}', ${data.quantidade})">

ADICIONAR PEÇA

</button>

`;

lista.appendChild(div);

QRCode.toCanvas(

document.getElementById(`qr-${data.codigo}`),

data.codigo,

{

width:120

}

);

});

/* STATS */

document.getElementById("totalCasulos")
.innerText = totalCasulos;

document.getElementById("totalPecas")
.innerText = totalPecas;

document.getElementById("casulosVazios")
.innerText = vazios;

document.getElementById("reposicao")
.innerText = reposicao;

});

}

/* =========================================================
RETIRAR
========================================================= */

async function retirarPeca(codigo, quantidade){

if(quantidade <= 0){

alert("Sem peças.");

return;

}

await db.collection("casulos")
.doc(codigo)
.update({

quantidade: quantidade - 1

});

await registrarHistorico(
`➖ Retirada no casulo ${codigo}`
);

}

/* =========================================================
ADICIONAR
========================================================= */

async function adicionarPeca(codigo, quantidade){

await db.collection("casulos")
.doc(codigo)
.update({

quantidade: quantidade + 1

});

await registrarHistorico(
`➕ Adição no casulo ${codigo}`
);

}

/* =========================================================
PESQUISA
========================================================= */

async function pesquisarCasulo(){

const termo =
document.getElementById("buscarCodigo")
.value
.toLowerCase();

const resultado =
document.getElementById("resultadoPesquisa");

resultado.innerHTML = "";

const snapshot =
await db.collection("casulos")
.get();

snapshot.forEach((doc)=>{

const data = doc.data();

if(

data.codigo.toLowerCase().includes(termo)

||

data.peca.toLowerCase().includes(termo)

){

resultado.innerHTML += `

<div class="casulo">

<h2>${data.codigo}</h2>

<div class="info">
${data.peca}
</div>

<div class="info">
Corredor ${data.corredor}
</div>

<div class="info">
Prateleira ${data.prateleira}
</div>

<div class="info">
Quantidade ${data.quantidade}
</div>

</div>

`;

}

});

}

/* =========================================================
HISTÓRICO
========================================================= */

async function registrarHistorico(texto){

await db.collection("historico")
.add({

texto,
data:new Date()

});

}

function carregarHistorico(){

db.collection("historico")
.orderBy("data", "desc")
.onSnapshot((snapshot)=>{

const lista =
document.getElementById("historicoLista");

lista.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();

const item =
document.createElement("div");

item.classList.add("historico-item");

item.innerHTML = `

${data.texto}

`;

lista.appendChild(item);

});

});

}

/* =========================================================
INICIAR
========================================================= */

carregarCasulos();

carregarHistorico();

</script>

</body>

</html>
